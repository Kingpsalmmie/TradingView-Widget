<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
</style>
</head>
<body>

<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" 
    src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" 
    async>
  {
    "colorTheme": "dark",
    "dateRange": "12M",
    "locale": "en",
    "isTransparent": false,
    "width": "100%",
    "height": "550",
    "tabs": [
      {
        "title": "Indices",
        "symbols": [
          { "s": "FOREXCOM:XAUUSD" },
          { "s": "FOREXCOM:NAS100" },
          { "s": "FOREXCOM:US30" }
        ]
      },
      {
        "title": "Forex",
        "symbols": [
          { "s": "FX:EURUSD" },
          { "s": "FX:GBPUSD" },
          { "s": "FX:USDJPY" }
        ]
      }
    ],
    "backgroundColor": "#0f0f0f",
    "showSymbolLogo": true,
    "showChart": false
  }
  </script>
</div>

</body>
</html>
